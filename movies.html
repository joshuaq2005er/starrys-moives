<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Movie Management | CinemaBook Pro</title>

<link rel="stylesheet" href="../css/style.css">

</head>


<body onload="checkAdmin();loadAdminMovies();">


<div class="admin-layout">


<div class="sidebar">

<h2>
🎬 CinemaBook
</h2>


<a href="dashboard.html">
Dashboard
</a>


<a href="movies.html">
Movies
</a>


<a href="bookings.html">
Bookings
</a>


<a href="theaters.html">
Theaters
</a>


<a href="concessions.html">
Food
</a>


<a href="settings.html">
Settings
</a>


<a onclick="logoutAdmin()">
Logout
</a>


</div>




<div class="dashboard">


<h1>
🎥 Movie Management
</h1>



<div class="admin-panel">


<h2>
Add Movie
</h2>



<div class="form-group">

<input id="movieName"
placeholder="Movie Name">

</div>



<div class="form-group">

<input id="movieGenre"
placeholder="Genre">

</div>



<div class="form-group">

<input id="movieRuntime"
placeholder="Runtime (Example: 2h 10m)">

</div>



<div class="form-group">

<input id="movieRating"
placeholder="Rating (PG-13)">

</div>



<div class="form-group">

<input id="moviePoster"
placeholder="Poster URL">

</div>



<button class="primary-btn"
onclick="addMovie()">

Add Movie

</button>


</div>





<div class="admin-panel">


<h2>
Current Movies
</h2>


<div id="movieTable">


</div>


</div>




</div>


</div>



<script src="../js/app.js"></script>

<script src="admin.js"></script>



<script>


function loadAdminMovies(){


let movies =
getMovies();



let box =
document.getElementById(
"movieTable"
);



box.innerHTML="";



movies.forEach(movie=>{


box.innerHTML += `


<div class="movieCard">


<img src="${movie.poster}">


<h3>
${movie.name}
</h3>


<p>

${movie.genre}

-

${movie.runtime}

</p>


<p>

${movie.rating}

</p>



<button class="delete-btn"
onclick="deleteMovie(${movie.id})">

Delete

</button>


</div>


`;


});


}





function addMovie(){



let movies =
getMovies();



let movie={


id:
Date.now(),


name:
document.getElementById(
"movieName"
).value,


genre:
document.getElementById(
"movieGenre"
).value,


runtime:
document.getElementById(
"movieRuntime"
).value,


rating:
document.getElementById(
"movieRating"
).value,


poster:
document.getElementById(
"moviePoster"
).value



};



if(!movie.name){

alert(
"Enter movie name"
);

return;

}



movies.push(movie);



localStorage.setItem(

"movies",

JSON.stringify(movies)

);



alert(
"Movie Added"
);



loadAdminMovies();



}





function deleteMovie(id){


if(!confirm(
"Delete this movie?"
))
return;



let movies =
getMovies();



movies =
movies.filter(
m=>m.id!==id
);



localStorage.setItem(

"movies",

JSON.stringify(movies)

);



loadAdminMovies();



}



</script>



</body>

</html>
