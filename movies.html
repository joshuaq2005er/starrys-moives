<script src="js/app.js"></script>


<script>


function loadMovies(){


const container =
document.getElementById(
"movieList"
);



const movies =
getMovies();



container.innerHTML="";



movies.forEach(movie=>{


container.innerHTML += `


<div class="movieCard"
data-name="${movie.name.toLowerCase()}">


<img src="${movie.poster}">


<h3>
${movie.name}
</h3>


<p>

${movie.genre}

•

${movie.runtime}

</p>


<p>

Rating:
${movie.rating}

</p>



<button onclick="openMovie('${movie.name}')">

Book Now

</button>


</div>



`;



});


}



function searchMovies(){


let value =
document
.getElementById(
"searchMovie"
)
.value
.toLowerCase();



document
.querySelectorAll(
".movieCard"
)
.forEach(card=>{


let name =
card.dataset.name;



if(name.includes(value)){


card.style.display="block";


}

else{


card.style.display="none";


}


});



}



document.addEventListener(
"DOMContentLoaded",
loadMovies
);



</script>
