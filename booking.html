<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Booking | CinemaBook Pro</title>

<link rel="stylesheet" href="css/style.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.1/css/all.min.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

</head>


<body>


<nav class="navbar">


<div class="logo">

<i class="fa-solid fa-film"></i>

CinemaBook Pro

</div>


<ul>

<li>
<a href="index.html">
Home
</a>
</li>


<li>
<a href="movies.html">
Movies
</a>
</li>

</ul>


</nav>



<section class="booking-container">


<div class="booking-panel">


<h2 id="movieTitle">

Movie Booking

</h2>



<div class="form-group">

<label>
Select Theater
</label>


<select id="theater">

<option value="1">
Theater 1
</option>


<option value="2">
Theater 2
</option>


</select>


</div>



<div class="form-group">

<label>
Show Time
</label>


<select id="showtime">

<option>
10:00 AM
</option>

<option>
1:30 PM
</option>

<option>
4:00 PM
</option>

<option>
7:30 PM
</option>

<option>
10:00 PM
</option>


</select>


</div>



<div class="screen">

SCREEN

</div>




<div class="legend">


<div class="legend-item">

<div class="legend-box"
style="background:#374151">

</div>

Available

</div>



<div class="legend-item">

<div class="legend-box"
style="background:#22c55e">

</div>

Selected

</div>



<div class="legend-item">

<div class="legend-box"
style="background:#ef4444">

</div>

Booked

</div>


</div>




<div class="seat-grid"
id="seatGrid">

</div>



<div class="admin-panel">


<h3>

Booking Information

</h3>


<div class="form-group">

<label>
Customer Name
</label>


<input 
id="customerName"
placeholder="Enter your name">

</div>




<h3>

Food & Drinks

</h3>


<div id="foodList">

</div>



<h2>

Total:
<span id="total">

$0

</span>

</h2>



<button class="primary-btn"
onclick="completeBooking()">

Confirm Booking

</button>


</div>


</div>


</section>



<script src="js/app.js"></script>

<script src="js/booking.js"></script>


</body>

</html>
