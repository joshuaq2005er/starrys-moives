<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Bookings | CinemaBook Pro</title>

<link rel="stylesheet" href="../css/style.css">

</head>


<body onload="checkAdmin();loadBookings();">


<div class="admin-layout">



<div class="sidebar">

Logout
</a>


</div>





<div class="dashboard">


<h1>
🎟️ Booking Management
</h1>



<div class="admin-panel">


<h2>
All Bookings
</h2>



<div class="table-container">


<table>


<thead>

<tr>

<th>
Customer
</th>

<th>
Movie
</th>

<th>
Theater
</th>

<th>
Showtime
</th>

<th>
Seats
</th>

<th>
Total
</th>

<th>
Action
</th>


</tr>

</thead>



<tbody id="bookingList">


</tbody>


</table>


</div>


</div>



</div>



</div>



<script src="../js/app.js"></script>

<script src="admin.js"></script>



<script>


function loadBookings(){


let bookings =
getBookings();



let table =
document.getElementById(
"bookingList"
);



table.innerHTML="";



if(bookings.length===0){


table.innerHTML=

`
<tr>

<td colspan="7">

No bookings found

</td>

</tr>
`;

return;


}




bookings
.slice()
.reverse()
.forEach((booking,index)=>{


table.innerHTML += `


<tr>


<td>

${booking.customer}

</td>



<td>

${booking.movie}

</td>



<td>

Theater ${booking.theater}

</td>



<td>

${booking.showtime}

</td>



<td>

${booking.seats.join(", ")}

</td>



<td>

${booking.total}

</td>



<td>


<button 
class="delete-btn"
onclick="deleteBooking(${booking.id})">

Refund

</button>


</td>



</tr>


`;



});



}




function deleteBooking(id){


if(!confirm(
"Refund this booking?"
))

return;



let bookings =
getBookings();



bookings =
bookings.filter(
b=>b.id!==id
);



localStorage.setItem(

"bookings",

JSON.stringify(bookings)

);



alert(
"Booking refunded"
);



loadBookings();



}



</script>


</body>

</html>
