<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Book Seats | CinemaBook Pro</title>

<link rel="stylesheet" href="css/style.css">

</head>


<body>


<nav class="navbar">

<div class="logo">
🎬 CinemaBook Pro
</div>


<ul>

<li>
<a href="index.html">Home</a>
</li>

<li>
<a href="movies.html">Movies</a>
</li>

</ul>

</nav>



<section class="booking-container">


<div class="booking-panel">


<h1 id="movieTitle">
Movie Booking
</h1>



<label>
Select Theater
</label>


<select id="theater">

<option value="1">
Theater 1
</option>


<option value="2">
Theater 2
</option>

</select>




<label>
Show Time
</label>


<select id="showtime">

<option>
10:00 AM
</option>

<option>
1:30 PM
</option>

<option>
4:00 PM
</option>

<option>
7:30 PM
</option>


</select>





<div class="screen">

SCREEN

</div>




<div class="seat-grid" id="seatGrid">


</div>




<div class="admin-panel">


<h2>
Customer Information
</h2>


<input 
id="customerName"
placeholder="Your Name">



<h2>
Total:
<span id="total">
$0
</span>

</h2>



<button class="primary-btn"
onclick="completeBooking()">

Confirm Booking

</button>


</div>



</div>


</section>



<script src="js/app.js"></script>

<script src="js/booking.js"></script>


</body>

</html>
